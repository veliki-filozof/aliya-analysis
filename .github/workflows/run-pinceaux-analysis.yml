name: Run Pinceaux Analysis

on:
  workflow_dispatch:
  push:
    paths:
      - 'Inputs/Raw/**'
      - 'scripts/**'
      - 'notebooks/**'
      - 'requirements.txt'
      - 'environment.yml'
      - '.github/workflows/run-pinceaux-analysis.yml'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all available pinceaux analyses
        run: |
          python scripts/run_all_pinceaux.py

      - name: Commit generated analysis data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Outputs Inputs/Edge_Corrected Inputs/MLI_only
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "ci: update generated analysis outputs"
            git push
          fi

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinceaux-outputs
          path: |
            Outputs/**
            Inputs/Edge_Corrected/**
            Inputs/MLI_only/**
          if-no-files-found: warn
