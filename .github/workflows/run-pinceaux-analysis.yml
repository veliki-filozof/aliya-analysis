name: Run Pinceaux Analysis

on:
  workflow_dispatch:
  push:
    paths:
      - 'Inputs/Raw/**'
      - 'Inputs/pinceaux_*.json'
      - '*.py'
      - '.github/workflows/run-pinceaux-analysis.yml'

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow matplotlib

      - name: Run all available pinceaux analyses
        run: |
          python run_all_pinceaux.py

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinceaux-outputs
          path: |
            Outputs/**
            Inputs/Edge_Corrected/**
            Inputs/MLI_only/**
          if-no-files-found: warn
